sonar.organization=eclipse
sonar.projectKey=org.eclipse.sumo

# relative paths to source directories. More details and properties are described
# in https://docs.sonarqube.org/latest/project-administration/narrowing-the-focus/
sonar.sources=.
# activating checks for the GitHub workflows and Dockerfiles triggers a lot of warnings for pip install like
# "Using dependencies without locking resolved versions is security-sensitive"
sonar.exclusions=**/*.java,**/*.flow,**/*CSHARP_wrap.cxx,**/*JAVA_wrap.cxx,**/*PYTHON_wrap.cxx,\
  .github/workflows/*,build_config/docker/*,**/pyproject.toml,**/config.h,\
  src/foreign/fontstash/*,src/foreign/nlohmann/*,src/foreign/zstr/*
sonar.host.url=https://sonarcloud.io
sonar.python.version=3.7, 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14

sonar.issue.ignore.multicriteria=e1,e2,e3,e4
# do not complain about constructing modal dialogs and immediately discarding the object e.g. GNEWarningBasicDialog
sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S5184
sonar.issue.ignore.multicriteria.e1.resourceKey=src/netedit/**/*.cpp
# do not complain about insecure paths in python tools coming from command line input
sonar.issue.ignore.multicriteria.e2.ruleKey=pythonsecurity:S8701
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.py
sonar.issue.ignore.multicriteria.e3.ruleKey=pythonsecurity:S8705
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.py
sonar.issue.ignore.multicriteria.e4.ruleKey=pythonsecurity:S8707
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.py
