buildType:
  default: Release
  choices:
    Release:
      short: Release
      long: Release
      buildType: Release
      settings:
        CMAKE_BUILD_TYPE: Release
    Debug:
      short: Debug
      long: Debug
      buildType: Debug
      settings:
        CMAKE_BUILD_TYPE: Debug
    Minimal:
      short: Minimal
      long: Minimal build without optional libs / GUI
      buildType: Release
      settings:
        CMAKE_BUILD_TYPE: Release
        CHECK_OPTIONAL_LIBS: OFF
        ENABLE_FOX: OFF
        BINARY_SUFFIX: M
        ENABLE_CS_BINDINGS: OFF
        ENABLE_JAVA_BINDINGS: OFF
        ENABLE_PYTHON_BINDINGS: OFF
    Profiling:
      short: Profiling
      long: Profiling
      buildType: RelWithDebInfo
      settings:
        CMAKE_BUILD_TYPE: RelWithDebInfo
        PROFILING: ON
