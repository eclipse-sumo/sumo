buildType:
  default: release
  choices:
    release:
      short: Release
      long: Release
      buildType: Release
      settings:
        CMAKE_BUILD_TYPE: Release
    clang-debug:
      short: clang-Debug
      long: Debug with clang
      buildType: Debug
      settings:
        CMAKE_BUILD_TYPE: Debug
        CMAKE_C_COMPILER: clang
        CMAKE_CXX_COMPILER: clang++
    debug:
      short: Debug
      long: Debug
      buildType: Debug
      settings:
        CMAKE_BUILD_TYPE: Debug
    minimal:
      short: Minimal
      long: Minimal build without optional libs / GUI
      buildType: Release
      settings:
        CMAKE_BUILD_TYPE: Release
        CHECK_OPTIONAL_LIBS: OFF
        ENABLE_FOX: OFF
        BINARY_SUFFIX: M
        ENABLE_CS_BINDINGS: OFF
        ENABLE_JAVA_BINDINGS: OFF
        ENABLE_PYTHON_BINDINGS: OFF
    profiling:
      short: Profiling
      long: Profiling
      buildType: RelWithDebInfo
      settings:
        CMAKE_BUILD_TYPE: RelWithDebInfo
        PROFILING: ON
