name: clang-warning-check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC, after the DLR nightly build

jobs:
  check-and-fix-warnings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Fetch log, generate AI fixes and PR body
        # The script authenticates to the GitHub Models inference endpoint
        # (https://models.inference.ai.azure.com) using the GITHUB_TOKEN that
        # Actions provides automatically — no extra secrets are needed.
        #
        # To use OpenAI instead, add an OPENAI_API_KEY repository secret and
        # the script will switch to the OpenAI endpoint automatically.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python ${{ github.workspace }}/tools/build_config/checkClangWarnings.py \
            --repo-root ${{ github.workspace }} \
            --pr-body-output /tmp/pr_body.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Fix clang compiler warnings (AI-generated)'
          title: 'Fix clang compiler warnings from daily build'
          draft: always-true
          base: main
          branch: fix-clang-warnings
          signoff: true
          body-path: /tmp/pr_body.md
