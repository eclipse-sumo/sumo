name: clang-warning-check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC, after the DLR nightly build

jobs:
  check-warnings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fetch log and generate warning report
        run: |
          python ${{ github.workspace }}/tools/build_config/checkClangWarnings.py \
            --output ${{ github.workspace }}/docs/clang_warnings.md

      - name: Pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Update clang warnings report (auto-generated)'
          title: 'Fix clang compiler warnings from daily build'
          add-paths: ${{ github.workspace }}/docs/clang_warnings.md
          draft: always-true
          base: main
          branch: fix-clang-warnings
          signoff: true
          body: |
            This draft PR was automatically generated by the daily [clang-warning-check](${{ github.server_url }}/${{ github.repository }}/actions/workflows/clang-warning-check.yml) workflow.

            The file `docs/clang_warnings.md` lists all compiler warnings found in the latest
            [clangDmake.log](https://sumo.dlr.de/daily/clangDmake.log) from the DLR nightly build.

            Please review each warning in the report and push fixes to the `fix-clang-warnings` branch.
            Once all warnings are resolved this PR can be merged and closed.
