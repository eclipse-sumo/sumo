name: windows-install

on:
  workflow_dispatch:
  push:
  schedule:
    - cron:  '25 11 * * *'

jobs:
  test-installer:
    runs-on: windows-latest

    steps:
      - name: Download MSI
        run: Invoke-WebRequest -Uri https://sumo.dlr.de/daily/sumo-win64-git.msi -OutFile sumo-win64.msi

      # Runtime: silent per-machine install
      - name: Install (per-machine)
        run: msiexec.exe /i sumo-win64.msi /qn /l*v install.log -Wait -PassThru

      - name: Verify installation
        run: |
          # Check binary exists
          if (-not (Test-Path "C:\Program Files (x86)\Eclipse\Sumo\bin\sumo-gui.exe")) {
            throw "sumo-gui.exe not found after install"
          }
          # Check env var was set (needs a fresh process to see system env)
          $sumoHome = [System.Environment]::GetEnvironmentVariable("SUMO_HOME", "Machine")
          if (-not $sumoHome) { throw "SUMO_HOME not set" }
          Write-Host "SUMO_HOME=$sumoHome"
        shell: pwsh

      - name: Uninstall
        run: msiexec.exe /x sumo-win64.msi /qn /l*v uninstall.log -Wait -PassThru

      - name: Verify uninstall
        run: |
          if (Test-Path "C:\Program Files (x86)\Eclipse\Sumo\bin\sumo-gui.exe") {
            throw "sumo-gui.exe still present after uninstall"
          }
          $sumoHome = [System.Environment]::GetEnvironmentVariable("SUMO_HOME", "Machine")
          if ($sumoHome) { throw "SUMO_HOME still set after uninstall: $sumoHome" }
        shell: pwsh

      # Runtime: silent per-user install
      - name: Install (per-user via MSIINSTALLPERUSER)
        run: msiexec.exe /i sumo-win64.msi MSIINSTALLPERUSER=1 /qn /l*v install_user.log -Wait -PassThru

      - name: Verify per-user installation path
        run: |
          $expected = "$env:LOCALAPPDATA\Eclipse\Sumo\bin\sumo-gui.exe"
          if (-not (Test-Path $expected)) {
            throw "sumo-gui.exe not found at per-user path: $expected"
          }
          # Check env var was set (needs a fresh process to see system env)
          $sumoHome = [System.Environment]::GetEnvironmentVariable("SUMO_HOME")
          if (-not $sumoHome) { throw "SUMO_HOME not set" }
          Write-Host "SUMO_HOME=$sumoHome"
        shell: pwsh

      - name: Uninstall (per-user)
        run: msiexec.exe /x sumo-win64.msi MSIINSTALLPERUSER=1 /qn /l*v uninstall_user.log -Wait -PassThru

      - name: Verify uninstall (per-user)
        run: |
          if (Test-Path "$env:LOCALAPPDATA\Eclipse\Sumo\bin\sumo-gui.exe") {
            throw "sumo-gui.exe still present after uninstall"
          }
          $sumoHome = [System.Environment]::GetEnvironmentVariable("SUMO_HOME")
          if ($sumoHome) { throw "SUMO_HOME still set after uninstall: $sumoHome" }
        shell: pwsh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: installer-logs
          path: "*.log"
