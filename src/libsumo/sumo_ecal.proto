syntax = "proto3";
package sumo;

message NetworkData {
  bool   geo_referenced = 2;
  string cache_path     = 3;
}

message TlsEntry {
  string id       = 1;
  string tls      = 2;
  int32  tl_index = 3;
}

message NetworkGeometry {
  uint32          version            = 17; // incremented on incompatible format changes
  bool            geo_referenced     = 1;
  // ---------------------------------------------------------------------------
  // Coordinate semantics for all position-bearing `bytes` fields below
  // (junction_positions, tls_positions, lane_positions,
  //  solid_marking_positions, dashed_marking_positions):
  //
  //   * In the on-disk CACHE file (v2+):  f32 LE, raw SUMO XY metres.
  //   * On the eCAL/WS WIRE:              f64 LE, lon/lat for geo nets,
  //                                       SUMO XY otherwise.  (The bridge
  //                                       does the cache→wire conversion
  //                                       using `proj_parameter` +
  //                                       `net_offset` when forwarding.)
  //
  // qt_cpp reads the cache directly (XY) so it never needs PROJ.  The
  // frontend reads the WS wire only (lon/lat) so it never needs PROJ
  // either.  This split keeps both renderers projection-free at the
  // cost of one batched pyproj transform in the bridge.
  // ---------------------------------------------------------------------------
  bytes           junction_starts    = 4;  // u32[] LE — cumulative vertex index per junction polygon
  bytes           junction_positions = 9;  // see Coordinate semantics block above
  bytes           tls_positions      = 5;  // see Coordinate semantics block above
  repeated string edge_ids           = 6;
  repeated string junction_ids       = 7;
  repeated TlsEntry tls_entries      = 8;
  string          proj_parameter     = 10; // proj4 string from <location>, empty if not geo-referenced
  string          net_offset         = 11; // "x,y" offset from <location>
  bytes           lane_starts        = 12; // u32[] LE — cumulative vertex index per lane
  bytes           lane_positions     = 13; // see Coordinate semantics block above
  bytes           lane_widths        = 14; // f32[] LE — width in metres per lane
  bytes           lane_edge_indices  = 15; // u32[] LE — index into edge_ids per lane
  repeated string lane_ids           = 16;

  // Lane markings (computed from sumolib geometry, already converted to final coords)
  bytes           solid_marking_starts     = 18; // u32[] LE — cumulative vertex index per solid line
  bytes           solid_marking_positions  = 19; // see Coordinate semantics block above
  bytes           dashed_marking_starts    = 20; // u32[] LE — cumulative vertex index per dashed line
  bytes           dashed_marking_positions = 21; // see Coordinate semantics block above

  // Turning arrows — one byte per lane, bit-field of allowed directions:
  //   bit 0 (1)  = straight (s)    bit 1 (2)  = left (l)
  //   bit 2 (4)  = right (r)       bit 3 (8)  = u-turn (t)
  //   bit 4 (16) = partial-left (L) bit 5 (32) = partial-right (R)
  bytes           lane_arrow_directions    = 22; // u8[]  LE — one byte per lane

  // Lane permission class — one byte per lane:
  //   0 = pedestrian/other  1 = bicycle only  2 = motorised (passenger/bus/truck/…)
  bytes           lane_perm_class          = 23; // u8[]  LE — one byte per lane

  // Stop line marker — one byte per lane, 1 if the lane ends at a stop-controlled
  // approach (priority_stop, allway_stop, rail_signal, rail_crossing). TLS
  // approaches are not marked here because the TLSLayer already draws a runtime
  // bar at the lane end.
  bytes           lane_has_stopline        = 24; // u8[]  LE — one byte per lane

  // Lane function — one byte per lane:
  //   0 = normal road lane
  //   1 = internal junction connector (curved arc through intersection)
  //   2 = pedestrian crossing
  //   3 = walking area
  bytes           lane_function            = 25; // u8[]  LE — one byte per lane

  // True if the network has meaningful Z coordinates. Currently always
  // false — XY-only positions in the buffers above. Reserved for a future
  // format bump that adds a parallel `*_positions_z` buffer (or switches
  // to interleaved XYZ).
  bool            has_z                    = 26;
}

// ---------------------------------------------------------------------------
// Additional-file content (polygons, POIs, stops, detectors).
// Same indirection pattern as NetworkData/NetworkGeometry: publisher caches
// the heavy binary to a file, then sends a Notice with the path. Bridge
// reads the file and forwards as a binary WS frame.
// ---------------------------------------------------------------------------

message AdditionalsNotice {
  enum Family {
    POLYGONS  = 0;
    STOPS     = 1;
    DETECTORS = 2;
  }
  string source_path    = 1;  // original additional XML path (also the dedupe key)
  string cache_path     = 2;  // resolved binary cache file
  Family family         = 3;
  bool   geo_referenced = 4;
}

message PolygonData {
  uint32 version        = 1;
  bool   geo_referenced = 2;

  // Filled / outlined polygons
  uint32          poly_count   = 10;
  bytes           poly_starts  = 11; // u32[] LE — cumulative vertex index, length poly_count+1
  bytes           poly_xy      = 12; // f32[] LE — interleaved [x,y,x,y,...]
  bytes           poly_rgba    = 13; // u8[]  LE — 4 bytes per poly
  bytes           poly_flags   = 14; // u8[]  LE — bit0=fill
  bytes           poly_layer   = 15; // f32[] LE — sumo "layer" attr, used for sort
  repeated string poly_ids     = 16;
  repeated string poly_types   = 17;

  // POIs (points)
  uint32          poi_count     = 30;
  bytes           poi_xy        = 31; // f32[] LE
  bytes           poi_rgba      = 32; // u8[]  LE
  bytes           poi_layer     = 33; // f32[] LE
  bytes           poi_width     = 34; // f32[] LE — metres; 0 = use default
  bytes           poi_height    = 35; // f32[] LE
  repeated string poi_ids       = 36;
  repeated string poi_types     = 37;
  repeated string poi_image_url = 38; // "" when absent
}

// Stopping places (bus/train/container stops, charging stations, parking areas).
// Each stop is resolved to a rectangle ring in world space by the publisher so
// the frontend can hand it straight to SolidPolygonLayer without per-frame lane
// lookups.
message StoppingPlaceData {
  uint32 version        = 1;
  bool   geo_referenced = 2;

  uint32          count       = 10;
  bytes           kind        = 11; // u8[] LE — 1=busStop 2=trainStop 3=containerStop 4=chargingStation 5=parkingArea
  bytes           xy_starts   = 12; // u32[] LE — cumulative vertex index, length count+1
  bytes           xy          = 13; // f32[] LE — interleaved [x,y,...], ring vertices
  bytes           rgba        = 14; // u8[] LE — 4 bytes per stop
  bytes           label_xy    = 15; // f32[] LE — 2 floats per stop (mid-point for label/icon)
  repeated string ids         = 16;
  repeated string names       = 17; // human-readable `name` attr
  repeated string lines       = 18; // bus/train lines (space-joined) — tooltip
}

// Detectors — E1 (point), E2 (lane segment), E3 (sets of entry/exit bars).
message DetectorData {
  uint32 version        = 1;
  bool   geo_referenced = 2;

  // E1 (point) detectors — rendered as short perpendicular bars.
  uint32          e1_count = 10;
  bytes           e1_xy    = 11; // f32[] LE — 2 floats per detector (midpoint)
  bytes           e1_angle = 12; // f32[] LE — radians, perpendicular bar orientation
  bytes           e1_rgba  = 13; // u8[] LE — 4 bytes per detector
  repeated string e1_ids   = 14;

  // E2 (lane segment) detectors — resolved rectangle rings, like stopping places.
  uint32          e2_count    = 30;
  bytes           e2_xy_starts = 31; // u32[] LE
  bytes           e2_xy       = 32;  // f32[] LE
  bytes           e2_rgba     = 33;  // u8[] LE
  repeated string e2_ids      = 34;

  // E3 entry/exit cross-sections — each rendered as an E1-style bar.
  uint32          e3_bar_count     = 50;
  bytes           e3_bar_xy        = 51; // f32[] LE
  bytes           e3_bar_angle     = 52; // f32[] LE
  bytes           e3_bar_rgba      = 53; // u8[] LE
  bytes           e3_bar_kind      = 54; // u8[] LE — 0=entry 1=exit
  repeated string e3_bar_parent_ids = 55; // parent E3 id per bar (for picking)
}

// ---------------------------------------------------------------------------
// Service: sumo_control
// ---------------------------------------------------------------------------

message CommandAck {
  bool   ok    = 1;
  string error = 2;
}

message SetDelayRequest  { int32 delay_ms = 1; }
message PauseRequest     {}
message ResumeRequest    {}
message StepRequest      {}
message GetStateRequest  {}
message GetStateResponse {
  int32  delay_ms              = 1;
  bool   paused                = 2;
  string sumocfg_path          = 3;
  int32  step_interval_current = 4;
  bool   step_at_min_bound     = 5;
  bool   step_at_max_bound     = 6;
  string network_cache_path    = 7; // path to binary network cache file; empty if no network loaded
  bool   simulation_ready      = 8; // true only after libsumo has finished loading and the step loop is running
  bool   benchmark             = 9; // true when publisher was started with --benchmark
}

message GetAttributesRequest  {}
message GetAttributesResponse {
  repeated string vehicle_available = 1;
  repeated string vehicle_enabled   = 2;
  repeated string edge_available    = 3;
  repeated string edge_enabled      = 4;
}

message SetAttributesRequest {
  repeated string vehicle_attributes = 1;
  repeated string edge_attributes    = 2;
}

message SetStepConfigRequest {
  int32 interval_min = 1;  // minimum steps between publishes (default 1)
  int32 interval_max = 2;  // maximum steps (default 10)
  bool  autotune     = 3;  // auto-tune within [min, max] to keep overhead <= 1.5× no-GUI baseline (≤ 33% of step time)
  // Runtime overrides for the publish-rate clamps.  Both default to 0 on
  // unset proto3 doubles which means "leave the current value alone".
  //   > 0  → use this value (frames per wall second).
  //   < 0  → disable the bound entirely (no cap / no floor).
  double max_publish_fps = 4;
  double min_publish_fps = 5;
}

message LoadRequest { string sumocfg_path = 1; }

message LogMessage {
  int64  time_ms = 1;
  string level   = 2;  // INFO, WARNING, ERROR
  string text    = 3;
}

message ListDirRequest  { string path = 1; }
message ListDirResponse {
  string          path  = 1;
  repeated string dirs  = 2;
  repeated string files = 3;
  string          error = 4;
}

message GetVehicleInfoRequest  { string id = 1; }
message GetVehicleInfoResponse {
  string              type_id     = 1;
  string              route_id    = 2;
  string              lane_id     = 3;
  double              lane_pos    = 4;
  repeated string     route_edges = 5;
  map<string, double> attributes  = 6;
}

message GetEdgeInfoRequest  { string id = 1; }
message GetEdgeInfoResponse {
  double          mean_speed    = 1;
  int32           vehicle_count = 2;
  int32           halting_count = 3;
  double          occupancy     = 4;
  double          waiting_time  = 5;
  repeated string vehicle_ids   = 6;
}

// Agent type dimension table (vehicles, persons, containers share one stable registry).
// Published once on load and whenever a new type_id is encountered.
// Bridge caches and replays to new WebSocket clients (like the network frame).
// Type indices are stable (insertion-order): each type_id receives a permanent index
// when first encountered; existing indices never shift when new types are added.
message VehicleTypeDict {
  uint32 type_count    = 1;
  bytes  type_id_block = 2;  // null-terminated UTF-8: type_count type IDs
  bytes  type_lengths  = 3;  // f32[type_count] LE: metres
  bytes  type_widths   = 4;  // f32[type_count] LE: metres
  bytes  type_shapes   = 5;  // null-terminated UTF-8: type_count SUMO gui_shape strings
  bytes  type_classes  = 6;  // u8[type_count]: 0=vehicle, 1=person, 2=container
}

// Frontend-side performance stats (rAF cadence and frame drop fraction).
// Sent both periodically during a run (rolling values, used by the publisher's
// render-aware autotune) and once at the end of a run (cumulative values, used
// for benchmark reporting).
message ReportFrontendStatsRequest {
  double avg_frame_ms = 1;  // cumulative average time between rAF callbacks (ms)
  double skip_rate    = 2;  // cumulative fraction of SimStepBin frames dropped (0–1)
  int32  frames       = 3;  // cumulative rAF frames rendered
  // Free-form "key=value " pairs of average per-frame phase timings (ms),
  // e.g. "parse=0.3 veh_build=0.5 drain=0.1 layers=2.0 edge_build=1.8 deck=6.5".
  // Empty when the frontend did not collect a breakdown.
  string breakdown    = 4;
  // Rolling (last ~1 s) values used by the publisher's render-aware autotune.
  // 0 means "no rolling data available; ignore" — the publisher will not let
  // these constrain the publish interval in that case.
  double rolling_frame_ms = 5;
  double rolling_skip_rate = 6;
}

// Unified high-frequency simulation snapshot — the sole payload on the
// sumo/simstep topic.  Field 1 is `edge_full_snapshot` so the wire encoding
// starts with either 0x08 0x01 (snapshot) or 0x08 0x00 (normal), letting the
// bridge cache snapshot frames for late joiners without parsing the message.
//
// All numeric arrays are little-endian typed arrays packed into bytes fields.
// Attribute value arrays are column-major: attr0[0..N-1], attr1[0..N-1], ...
// Attribute order matches ctrl["vehicle_attributes"] / ctrl["edge_attributes"]
// (= vehicle_enabled / edge_enabled in GetAttributesResponse).
message SimStepBin {
  bool   edge_full_snapshot = 1;   // true = all-edges baseline; false = occupied-only delta
  int64  time_ms            = 2;
  uint32 seq_num            = 3;   // publisher-side counter, incremented per frame sent; gaps = dropped

  // --- vehicle section ---
  uint32 veh_count          = 4;
  uint32 veh_attr_count     = 5;   // K_v
  bytes  veh_positions      = 6;   // f64[N×3] LE: [x,y,z=0, x,y,z=0, ...]
  //   3 components so deck.gl SimpleMeshLayer can use the bytes as a zero-copy
  //   size=3 Float64Array without expansion. z=0 now; road elevation later.
  bytes  veh_angles         = 7;   // f32[N] LE: SUMO degrees (0=north, CW); frontend negates for deck.gl yaw
  bytes  veh_speeds         = 8;   // f32[N] LE
  bytes  veh_attr_vals      = 9;   // f32[N×K_v] LE column-major
  bytes  vehicle_ids        = 10;  // null-terminated UTF-8
  bytes  veh_type_indices   = 11;  // u32[N] LE: index into VehicleTypeDict

  // --- mobile agent section (persons + containers) ---
  uint32 agent_count        = 12;
  bytes  agent_positions    = 13;  // f64[A×3] LE: [x,y,z=0, ...]
  bytes  agent_angles       = 14;  // f32[A] LE
  bytes  agent_ids          = 15;  // null-terminated UTF-8
  bytes  agent_type_indices = 16;  // u32[A] LE

  // --- edge section (empty when no edge attrs enabled) ---
  uint32 edge_count         = 17;
  uint32 edge_attr_count    = 18;  // K_e
  bytes  edge_indices       = 19;  // u32[M] LE: index into NetworkGeometry.edge_ids
  bytes  edge_attr_vals     = 20;  // f32[M×K_e] LE column-major

  // --- traffic light section (folded in from former TLSUpdate topic) ---
  // tls_ids and tls_states are parallel null-terminated UTF-8 blobs, one entry
  // per active TLS controller. tls_states[i] is the full RYG/active-program
  // state string for tls_ids[i] (variable length per controller). Empty when
  // the network has no traffic lights.
  uint32 tls_count          = 21;
  bytes  tls_ids            = 22;
  bytes  tls_states         = 23;
}
